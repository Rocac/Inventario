<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Editar Proveedor</title>

<style>
:root{
  --bg:#f3f6fb; --sidebar1:#1f66ff; --sidebar2:#31b8ff; --topbar:#1f66ff;
  --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e5e7eb;
  --shadow:0 12px 28px rgba(0,0,0,.10); --radius:14px;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--sidebar1),var(--sidebar2));color:#fff;padding:18px 14px;position:sticky;top:0;height:100vh}
.brand,.profile{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.12);margin-bottom:14px}
.profile{background:rgba(255,255,255,.10)}
.logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.18)}
.avatar{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.18);display:grid;place-items:center}
.menu-title{margin:14px 10px 8px;font-size:11px;opacity:.85;letter-spacing:.14em}
.nav a{display:flex;gap:10px;align-items:center;padding:10px 12px;border-radius:12px;color:#fff;text-decoration:none;opacity:.95}
.nav a:hover{background:rgba(255,255,255,.12)}
.nav a.active{background:rgba(255,255,255,.18);font-weight:800}
.content{min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--topbar);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;box-shadow:0 8px 16px rgba(0,0,0,.10)}
.crumbs{font-size:12px;opacity:.95}
.page{padding:18px}
h1{margin:6px 0 14px;font-size:22px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;max-width:820px}
.card-header{padding:12px 14px;border-bottom:1px solid var(--line);background:#f8fbff;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card-body{padding:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
label{display:block;font-size:12px;font-weight:900;color:var(--muted);margin-bottom:6px;letter-spacing:.06em}
input,textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;
  outline:none;font-size:14px;background:#fff
}
textarea{min-height:90px;resize:vertical}
input:focus,textarea:focus{border-color:rgba(31,102,255,.45);box-shadow:0 0 0 3px rgba(31,102,255,.12)}
.actions{display:flex;gap:10px;justify-content:flex-end;padding:14px;border-top:1px solid var(--line);background:#fff;flex-wrap:wrap}
.btn{padding:10px 12px;border-radius:12px;border:1px solid var(--line);text-decoration:none;font-weight:900;font-size:13px;cursor:pointer;background:#fff;color:var(--text);display:inline-flex;gap:8px;align-items:center}
.primary{background:var(--sidebar1);border-color:transparent;color:#fff}
@media(max-width:980px){.layout{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="logo">🏷️</div>
      <div><b>Inventarios</b><br><span style="font-size:12px">Categorías</span></div>
    </div>

    <div class="profile">
      <div class="avatar">👤</div>
      <div><div style="font-weight:900">{{ username }}</div><small>Usuario activo</small></div>
    </div>

    <div class="menu-title">MANTENIMIENTOS</div>
    <nav class="nav">
      <a href="/categorias">🏷️ Categorías</a>
      <a href="/productos">📦 Productos</a>
      <a href="/proveedores" class="active">🏭 Proveedores</a>
      <a href="/clientes">🧑 Clientes</a>
    </nav>

    <div class="menu-title">OPERACIONES</div>
    <nav class="nav">
      <a href="/ventas/nueva">💲 Registrar venta</a>
      <a href="/ventas">🧾 Historial de ventas</a>
      <a href="/kardex">📒 Kardex</a>
    </nav>

    <div class="menu-title">SESIÓN</div>
    <nav class="nav">
      <a href="{{ url_for('logout') }}">🚪 Salir</a>
    </nav>
  </aside>

  <div class="content">
    <div class="topbar">
      <div style="font-weight:900">Proveedores</div>
    </div>

    <div class="page">
      <h1>Editar proveedor</h1>

      <!-- supplier = (id, name, phone, email, notes) -->
      <form class="card" method="POST">
        <div class="card-header">
          <b>✏ Datos del proveedor</b>
          <span style="font-size:12px;color:#64748b;font-weight:800">Actualiza y guarda</span>
        </div>

        <div class="card-body">
          <div class="grid">
            <div class="full">
              <label>NOMBRE *</label>
              <input name="name" value="{{ supplier[1] }}" required>
            </div>

            <div>
                <label>TELÉFONO (9 dígitos)</label>
                <input name="phone"
                    value="{{ supplier[2] or '' }}"
                    inputmode="numeric"
                    pattern="^\d{9}$"
                    maxlength="9">
            </div>

            <div>
                <label>EMAIL</label>
                <input name="email"
                    type="email"
                    value="{{ supplier[3] or '' }}"
                    pattern="^[^\s@]+@[^\s@]+\.[^\s@]{2,}$">
            </div>

            <div class="full">
              <label>NOTAS</label>
              <textarea name="notes">{{ supplier[4] or '' }}</textarea>
            </div>
          </div>
        </div>

        <div class="actions">
          <a class="btn" href="/proveedores">Cancelar</a>
          <button class="btn primary" type="submit">Guardar cambios</button>
        </div>
      </form>

    </div>
  </div>

</div>
</body>
</html>
